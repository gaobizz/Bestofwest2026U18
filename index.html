// Label-based bracket parser. Finds Z1-Z12 and Y1-Y12 labels in the sheet
// and reads teams/winners/scores from relative positions. Returns both
// scores AND authoritative QF team assignments from the bracket sheet
// (so team display doesn't depend on pool standings being correct).
function parseBracket(rows,poolStandings,logs){
  const scores={},qfTeams={};
  if(!rows||!rows.length)return{scores,qfTeams};

  const matchTeam=cell=>{
    let c=String(cell||"").toLowerCase().trim().replace(/[.,()\[\]]/g,"").replace(/\s+/g," ");
    if(!c)return null;
    if(TEAM_ABBREV[c])return TEAM_ABBREV[c];
    const words=c.split(" ");
    for(let n=words.length;n>=1;n--){
      const key=words.slice(0,n).join(" ");
      if(TEAM_ABBREV[key])return TEAM_ABBREV[key];
    }
    return null;
  };

  const parseScores=cell=>{
    const s=String(cell||"").trim().replace(/[\u2013\u2014]/g,"-");
    if(!/^\d{1,2}-\d{1,2}(\s*,\s*\d{1,2}-\d{1,2}){0,3}$/.test(s))return null;
    const pairs=[];const re=/(\d{1,2})-(\d{1,2})/g;let m;
    while((m=re.exec(s))!==null)pairs.push({a:parseInt(m[1]),b:parseInt(m[2])});
    if(!pairs.length)return null;
    const nums=pairs.flatMap(p=>[p.a,p.b]);
    if(Math.max(...nums)<15)return null;
    return pairs;
  };

  const qfSlotId=seed=>{
    const pk=seed[0],sn=parseInt(seed[1]);
    const st=poolStandings[pk];
    if(!st||!st[sn-1])return null;
    return st[sn-1].id;
  };

  // Find all Z/Y labels in the sheet
  const labels={};
  for(let r=0;r<rows.length;r++){
    const row=rows[r]||[];
    for(let c=0;c<row.length;c++){
      const v=String(row[c]||"").trim().toUpperCase();
      if(/^[ZY](1[0-2]|[1-9])$/.test(v))labels[v]={r,c};
    }
  }
  logs.push("  Labels: "+Object.keys(labels).sort().join(", "));

  // QF layout: label at (r,c). Top team at (r-2,c), bottom at (r+3,c).
  // Winner at (r, c±1), scores at (r+2, c±1).
  const parseQF=qf=>{
    const label=qf.id.toUpperCase();
    const loc=labels[label];
    if(!loc){logs.push("  "+label+": label not found");return}
    const{r,c}=loc;

    let topId=null,topName="";
    for(const dr of[-2,-3,-1]){
      const n=String((rows[r+dr]||[])[c]||"").trim();
      const id=matchTeam(n);
      if(id){topId=id;topName=n;break}
    }
    let botId=null,botName="";
    for(const dr of[3,4,2]){
      const n=String((rows[r+dr]||[])[c]||"").trim();
      const id=matchTeam(n);
      if(id){botId=id;botName=n;break}
    }
    if(!topId||!botId){
      logs.push("  "+label+": missing teams top='"+topName+"' bot='"+botName+"'");
      return;
    }

    // Determine home/away from T1Q/T2Q seeds. If standings disagree with
    // the bracket, trust the BRACKET (it's authoritative) and assume top=home.
    const seedHome=qfSlotId(qf.seeds[0]);
    const seedAway=qfSlotId(qf.seeds[1]);
    let homeId,awayId;
    if(topId===seedHome){homeId=topId;awayId=botId}
    else if(topId===seedAway){homeId=botId;awayId=topId}
    else{
      homeId=topId;awayId=botId;
      logs.push("  "+label+": standings mismatch, using bracket teams (top="+topId+" bot="+botId+")");
    }
    qfTeams[qf.id]={home:homeId,away:awayId};

    // Winner + scores in adjacent column (prefer c+1, fallback c-1)
    let winnerId=null,pairs=null;
    for(const dc of[1,-1]){
      const wn=String((rows[r]||[])[c+dc]||"").trim();
      const scCell=String((rows[r+2]||[])[c+dc]||"").trim();
      const wid=matchTeam(wn);
      const spr=parseScores(scCell);
      if(wid&&spr&&(wid===topId||wid===botId)){winnerId=wid;pairs=spr;break}
    }
    if(!winnerId||!pairs){
      logs.push("  "+label+": teams only (not played yet)");
      return;
    }

    // Convention: first number in each pair = winner's score
    const winnerIsHome=(winnerId===homeId);
    const sets=pairs.map(p=>winnerIsHome?{home:p.a,away:p.b}:{home:p.b,away:p.a});
    scores[qf.id]={sets};
    logs.push("  "+label+": "+homeId+" vs "+awayId+" W:"+winnerId+" "+sets.map(s=>s.home+"-"+s.away).join(","));
  };

  for(const qf of[...T1Q,...T2Q])parseQF(qf);

  // Chain resolution for later rounds (uses qfTeams when available)
  const resolveChain=(source,pending)=>{
    if(!source)return null;
    const{gid,r}=source;
    const sets=pending[gid]?.sets;
    if(!sets||!sets.length)return null;
    let hW=0,aW=0;
    for(const s of sets){if(s.home>s.away)hW++;else if(s.away>s.home)aW++}
    if(hW===0&&aW===0)return null;
    const want=r==="winner"?(hW>aW?"home":"away"):(hW>aW?"away":"home");
    const qf=[...T1Q,...T2Q].find(q=>q.id===gid);
    if(qf){
      const t=qfTeams[gid];
      if(t)return want==="home"?t.home:t.away;
      return want==="home"?qfSlotId(qf.seeds[0]):qfSlotId(qf.seeds[1]);
    }
    const later=[...ST1,...ST2].find(x=>x.id===gid);
    if(later){
      const hid=resolveChain(later.homeFrom,pending);
      const aid=resolveChain(later.awayFrom,pending);
      return want==="home"?hid:aid;
    }
    return null;
  };

  // Parse later rounds by finding label, scores nearby, and winner above
  const parseLater=game=>{
    const label=game.id.toUpperCase();
    const loc=labels[label];
    if(!loc)return;
    const{r,c}=loc;
    const homeId=resolveChain(game.homeFrom,scores);
    const awayId=resolveChain(game.awayFrom,scores);
    if(!homeId||!awayId)return;

    for(let dr=0;dr<=4;dr++){
      for(let dc=-1;dc<=1;dc++){
        if(dr===0&&dc===0)continue;
        const scCell=String((rows[r+dr]||[])[c+dc]||"").trim();
        const pairs=parseScores(scCell);
        if(!pairs)continue;
        for(let wdr=1;wdr<=3;wdr++){
          const wc=String((rows[r+dr-wdr]||[])[c+dc]||"").trim();
          const wid=matchTeam(wc);
          if(wid&&(wid===homeId||wid===awayId)){
            const winnerIsHome=(wid===homeId);
            const sets=pairs.map(p=>winnerIsHome?{home:p.a,away:p.b}:{home:p.b,away:p.a});
            scores[game.id]={sets};
            logs.push("  "+label+": "+homeId+" vs "+awayId+" W:"+wid+" "+sets.map(s=>s.home+"-"+s.away).join(","));
            return;
          }
        }
      }
    }
  };

  for(const game of[...ST1.slice(0,4),...ST2.slice(0,4)])parseLater(game);
  for(const game of[...ST1.slice(4),...ST2.slice(4)])parseLater(game);

  return{scores,qfTeams};
}

function parseMatrix(pk,rows,logs){
  const pool=POOLS[pk],parsed={};
  const matchTeam=(cell,team)=>{const c=String(cell||"").toLowerCase().trim();if(!c)return false;return c.includes(team.id.toLowerCase())||c.includes(team.name.toLowerCase().replace(/\s+(vc|volleyball club)$/i,""))};
  let hdr=-1,tCols={};
  for(let r=0;r<Math.min(rows.length,10);r++){let f=0;const seen={};for(let c=0;c<(rows[r]||[]).length;c++){for(const t of pool.teams){if(!seen[t.id]&&matchTeam(rows[r][c],t)){tCols[t.id]=c;seen[t.id]=true;f++;break}}}if(f>=3){hdr=r;break}}
  if(hdr<0){logs.push("  No header found");return parsed}
  logs.push("  Header row "+hdr+", cols: "+JSON.stringify(tCols));
  const ord=pool.teams.map(t=>({id:t.id,c:tCols[t.id]})).filter(t=>t.c!==undefined).sort((a,b)=>a.c-b.c);
  const cRange={};for(let i=0;i<ord.length;i++){const s=ord[i].c;const e=i<ord.length-1?ord[i+1].c:s+5;cRange[ord[i].id]={s,e}}
  const tRows={};for(let r=hdr+1;r<rows.length;r++){const row=rows[r]||[];for(const t of pool.teams){if(tRows[t.id]!==undefined)continue;for(let c=0;c<Math.min(3,row.length);c++){if(matchTeam(row[c],t)){tRows[t.id]=r;break}}}}
  logs.push("  Row starts: "+JSON.stringify(tRows));
  for(const game of pool.games){
    const hr=tRows[game.home],ac=cRange[game.away];
    if(hr===undefined||!ac)continue;
    const sets=[];
    for(let r=hr;r<Math.min(hr+3,rows.length);r++){
      const row=rows[r]||[];const nums=[];
      for(let c=ac.s;c<ac.e;c++){const v=String(row[c]||"").trim();if(/^\d{1,2}$/.test(v)){const n=parseInt(v);if(n>=0&&n<=50)nums.push(n)}}
      if(nums.length>=2)sets.push({home:nums[0],away:nums[1]});
    }
    if(sets.length>0){parsed[game.id]={sets};logs.push("  "+game.home+" vs "+game.away+": "+sets.map(s=>s.home+"-"+s.away).join(", "))}
  }
  return parsed;
}

// --- STANDINGS ---
function calcSt(pk,sc){const pool=POOLS[pk],st={};pool.teams.forEach(t=>{st[t.id]={id:t.id,name:t.name,w:0,l:0,sW:0,sL:0,pW:0,pL:0}});pool.games.forEach(g=>{const s=sc[g.id];if(!s?.sets?.length)return;let hW=0,aW=0;s.sets.forEach(set=>{const h=typeof set.home==="number"?set.home:0,a=typeof set.away==="number"?set.away:0;if(h>a)hW++;else if(a>h)aW++;if(st[g.home]){st[g.home].pW+=h;st[g.home].pL+=a}if(st[g.away]){st[g.away].pW+=a;st[g.away].pL+=h}});if(st[g.home]){st[g.home].sW+=hW;st[g.home].sL+=aW}if(st[g.away]){st[g.away].sW+=aW;st[g.away].sL+=hW}if(hW>aW){if(st[g.home])st[g.home].w++;if(st[g.away])st[g.away].l++}else if(aW>hW){if(st[g.away])st[g.away].w++;if(st[g.home])st[g.home].l++}});return Object.values(st).sort((a,b)=>{const aMP=a.w*2+a.l,bMP=b.w*2+b.l;if(bMP!==aMP)return bMP-aMP;const sr=a.sW*b.sL-b.sW*a.sL;if(sr!==0)return sr>0?-1:1;const pr=a.pW*b.pL-b.pW*a.pL;if(pr!==0)return pr>0?-1:1;return 0})}
function pD(pk,sc){return POOLS[pk].games.every(g=>sc[g.id]?.sets?.length>0&&sc[g.id].sets.every(s=>typeof s.home==="number"&&typeof s.away==="number"))}
function pC(pk,sc){return POOLS[pk].games.filter(g=>sc[g.id]?.sets?.length>0).length}

// --- T1/T2 PROBABILITY ---
function calcChances(pk,sc){
  const pool=POOLS[pk];
  const remaining=pool.games.filter(g=>!sc[g.id]?.sets?.length||!sc[g.id].sets.every(s=>typeof s.home==="number"&&typeof s.away==="number"));
  if(remaining.length===0){const st=calcSt(pk,sc);const r={};st.forEach((t,i)=>{r[t.id]={t1:i<2?100:0,t2:i>=2?100:0,pos:i+1}});return r}
  const n=remaining.length;const total=Math.pow(2,n);
  const counts={};pool.teams.forEach(t=>{counts[t.id]={t1:0,t2:0}});
  for(let mask=0;mask<total;mask++){
    const simSc={...sc};
    for(let i=0;i<n;i++){
      const g=remaining[i];
      if(mask&(1<<i))simSc[g.id]={sets:[{home:25,away:20},{home:25,away:20}]};
      else simSc[g.id]={sets:[{home:20,away:25},{home:20,away:25}]};
    }
    const st=calcSt(pk,simSc);
    st.forEach((t,i)=>{if(i<2)counts[t.id].t1++;else counts[t.id].t2++});
  }
  const r={};pool.teams.forEach(t=>{r[t.id]={t1:Math.round(counts[t.id].t1/total*100),t2:Math.round(counts[t.id].t2/total*100)}});
  return r;
}

function hardReload(){

  const base=location.pathname;

// Clean cache-buster param from URL on load (keeps URL clean)

// Auto-reload when returning to homescreen app after 5+ minutes

  if(document.visibilityState==="visible"){

// Register service worker for network-first caching (if supported)
if("serviceWorker" in navigator){
  // Create a tiny network-first SW via data URI
  const swCode="self.addEventListener('install',function(e){self.skipWaiting()});self.addEventListener('activate',function(e){e.waitUntil(self.clients.claim());e.waitUntil(caches.keys().then(function(k){return Promise.all(k.map(function(c){return caches.delete(c)}))}))});self.addEventListener('fetch',function(e){e.respondWith(fetch(e.request).then(function(r){return r}).catch(function(){return caches.match(e.request)}))})";
  // Try to register - if it fails (blob not allowed), that's ok, the URL busting still works
  try{
    const b=new Blob([swCode],{type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});
  }catch(e){}
}

                <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:"0.65em",color:th.textDark,fontFamily:"monospace"}}>
                  <span style={{color:th.green}}>Tier 1 Championship: {ch.t1}%</span>
                  <span style={{color:th.accent}}>Tier 2 Consolation: {ch.t2}%</span>
                </div>
              </div>)
            })}
          </div>)
        })}
      </div>}

      {/* PLAYOFFS */}
      {tab==="playoffs"&&<div>
        {/* FINAL STANDINGS - only shows ranks that are determined */}
        {(()=>{
          const placements=getFinalPlacements();
          if(placements.length===0)return null;
          return(<div style={{marginBottom:12,background:th.card,border:"1px solid "+th.accent+"66",borderRadius:10,overflow:"hidden"}}>
            <div style={{padding:"10px 12px",background:th.accentBg,borderBottom:"1px solid "+th.border}}>
              <div style={{fontSize:"0.9em",color:th.accent,fontFamily:"monospace",fontWeight:800,letterSpacing:1.5}}>FINAL STANDINGS 🏆</div>
              <div style={{fontSize:"0.68em",color:th.textDark,marginTop:2}}>{placements.length} of 16 placements determined</div>
            </div>
            {placements.map(p=>{
              const isMe=p.id===homeTeam;
              const rankColor=p.rank===1?th.accent:p.rank===2?th.textDim:p.rank===3?"#cd7f32":th.textMuted;
              return(<div key={p.rank} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",borderBottom:"1px solid "+th.border,background:isMe?th.accentBg:"transparent"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0,flex:1}}>
                  <span style={{fontSize:"0.85em",fontWeight:800,color:rankColor,fontFamily:"monospace",minWidth:28}}>#{p.rank}</span>
                  <span style={{fontSize:"0.9em",fontWeight:isMe?800:600,color:isMe?th.accent:th.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</span>
                </div>
                <span style={{fontSize:"0.62em",color:p.rank<=3?th.accent:th.textDark,fontWeight:700,fontFamily:"monospace",textAlign:"right",marginLeft:8}}>{p.label}</span>
              </div>)
            })}
          </div>);
        })()}

        {/* TIER 1 */}
        <div onClick={()=>setTier1Open(!tier1Open)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 10px",background:th.card,border:"1px solid "+th.border,borderRadius:tier1Open?"8px 8px 0 0":"8px",cursor:"pointer",marginBottom:tier1Open?0:10}}>
          <div>
            <div style={{fontSize:"0.9em",color:th.green,fontFamily:"monospace",fontWeight:800}}>TIER 1 CHAMPIONSHIP — Z BRACKET</div>
            <div style={{fontSize:"0.72em",color:th.textDark,marginTop:2}}>1st & 2nd from each pool · Sat 6:30 PM</div>
          </div>
          <span style={{fontSize:"1.2em",color:th.textMuted,pointerEvents:"none",transition:"transform 0.2s",transform:tier1Open?"rotate(180deg)":"rotate(0)"}}>{"\u25BE"}</span>
        </div>
        {tier1Open&&<div style={{background:th.syncBg,border:"1px solid "+th.border,borderTop:"none",borderRadius:"0 0 8px 8px",padding:"10px 10px 12px",marginBottom:10}}>
          <div style={{fontSize:"0.75em",color:th.textMuted,fontFamily:"monospace",fontWeight:700,marginBottom:8}}>QUARTERFINALS</div>
          {T1Q.map(q=><QFC key={q.id} qf={q}/>)}
          <div style={{fontSize:"0.75em",color:th.textMuted,fontFamily:"monospace",fontWeight:700,marginTop:12,marginBottom:6}}>SEMI-FINALS — Sunday 12:15 PM</div>
          {ST1.slice(0,4).map(g=><KO key={g.id} g={g}/>)}
          <div style={{fontSize:"0.75em",color:th.textMuted,fontFamily:"monospace",fontWeight:700,marginTop:12,marginBottom:6}}>FINALS — Sunday 5:15 PM</div>
          {ST1.slice(4).map(g=><KO key={g.id} g={g}/>)}
        </div>}

        {/* TIER 2 */}
        <div onClick={()=>setTier2Open(!tier2Open)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 10px",background:th.card,border:"1px solid "+th.border,borderRadius:tier2Open?"8px 8px 0 0":"8px",cursor:"pointer",marginBottom:tier2Open?0:10}}>
          <div>
            <div style={{fontSize:"0.9em",color:th.accent,fontFamily:"monospace",fontWeight:800}}>TIER 2 CONSOLATION — Y BRACKET</div>
            <div style={{fontSize:"0.72em",color:th.textDark,marginTop:2}}>3rd & 4th from each pool · Sat 5:15 PM</div>
          </div>
          <span style={{fontSize:"1.2em",color:th.textMuted,pointerEvents:"none",transition:"transform 0.2s",transform:tier2Open?"rotate(180deg)":"rotate(0)"}}>{"\u25BE"}</span>
        </div>
        {tier2Open&&<div style={{background:th.syncBg,border:"1px solid "+th.border,borderTop:"none",borderRadius:"0 0 8px 8px",padding:"10px 10px 12px",marginBottom:10}}>
          <div style={{fontSize:"0.75em",color:th.textMuted,fontFamily:"monospace",fontWeight:700,marginBottom:8}}>QUARTERFINALS</div>
          {T2Q.map(q=><QFC key={q.id} qf={q}/>)}
          <div style={{fontSize:"0.75em",color:th.textMuted,fontFamily:"monospace",fontWeight:700,marginTop:12,marginBottom:6}}>SEMI-FINALS — Sunday 9:45 AM</div>
          {ST2.slice(0,4).map(g=><KO key={g.id} g={g}/>)}
          <div style={{fontSize:"0.75em",color:th.textMuted,fontFamily:"monospace",fontWeight:700,marginTop:12,marginBottom:6}}>FINALS — Sunday 2:45 PM</div>
          {ST2.slice(4).map(g=><KO key={g.id} g={g}/>)}
        </div>}
      </div>}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
